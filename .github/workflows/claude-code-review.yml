# ============================================================================
# Claude Code — Automated PR Review
# ============================================================================
# Thin wrapper around lentago/shared-workflows/claude-review.yml.
# Pinned to Haiku.
#
# >>> CUSTOMIZE THE review_prompt BELOW FOR THIS REPO. <<<
# Do NOT ship the placeholder. A copy-pasted prompt that describes the wrong
# repo is worse than none — it points the reviewer at the wrong rubric. The
# good fleet examples (betula, drosera,
# reference-checker) each describe their OWN content.
# Also review `paths-ignore`: if markdown is this repo's product, do NOT
# ignore "*.md".
# ============================================================================

name: Claude Code Review

# >>> DISABLED 2026-06-25: automated Claude PR review turned off fleet-wide.
# Trigger changed from `pull_request` to manual `workflow_dispatch` only, so it
# never auto-runs on PRs. The repo-specific review_prompt below is preserved.
# To re-enable, restore the `on: pull_request` trigger (see git history).
on:
  workflow_dispatch:

jobs:
  claude-review:
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    uses: lentago/shared-workflows/.github/workflows/claude-review.yml@main
    secrets: inherit
    with:
      review_prompt: |
        This repository is lunaria, the Lentago Labs shared-viewport product:
        a concept/design doc (docs/concept.md), a BrightScript Roku dev
        channel (roku-app/) that plays the wall-display HLS stream, and a
        sideload script. The runtime stack is provisioned from the kalmia
        repo, NOT here. Focus the review on:

        **BrightScript correctness** — the auto-retry handler in
        VideoScene.xml is load-bearing (a bare Video node never recovers from
        a publisher restart); flag any change that weakens or removes the
        state-observer + Timer retry loop, and any stream URL change that
        drops the `?cookieCheck=1` suffix mediamtx requires.

        **Ownership boundary** — changes that fork or duplicate kalmia's
        runtime scripts (shooter/rotator/encoder, systemd units, mediamtx
        config) into this repo violate the product/provisioning split; they
        belong in kalmia's roles/lunaria.

        **Pane-contract consistency** — docs and any future compositor code
        must agree with the contract in docs/concept.md (1280px wide, exact
        720px bands ≤2880, nothing straddling a band, clock-overlay corner
        kept clear). Flag drift between the doc and code.

        **Shell safety** — scripts/ should be set -euo pipefail, take
        credentials only from the environment, and never embed the Roku dev
        password, LAN credentials, or tokens.

        **Doc quality** — markdown is part of this repo's product; concept
        changes should keep the rubric table, contract, and phases coherent
        rather than contradicting each other.
    # Markdown IS product here — do not add "*.md" to paths-ignore.
